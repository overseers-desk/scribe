# scribe configuration. Copy to ~/.config/scribe/config.ini (or the repo root
# for development) and fill in a provider. One file holds every provider.
#
# This file is entirely optional. With no config and no api_key, scribe runs as
# a dictation tool; the style pass is the only feature that needs a provider.
# Unconfigured, the Style button stays in the window and explains how to add one.
#
# INI: [provider.NAME] sections plus a top-level default_provider. Values may be
# bare or quoted; comments start with # on their own line so [section] headers
# parse.

# Which [provider.NAME] the style pass uses by default. Override per-run with
# --provider NAME. If exactly one provider is defined, it is used even without
# this line.
default_provider = deepseek

# Any OpenAI-compatible chat-completions endpoint works; set api_base per
# provider. A section with no api_key is treated as not configured.

[provider.deepseek]
api_key  = sk-...
model    = deepseek-chat
# Optional: 1-pass mode (preprocess + style as one merged call) sends its call
# to this model; without the key, 1-pass uses `model`. The other pipeline modes
# never use it.
thinking_model = deepseek-reasoner
api_base = https://api.deepseek.com

[provider.claude]
api_key  = sk-ant-...
model    = claude-opus-4-8
api_base = https://api.anthropic.com

[provider.chatgpt]
api_key  = sk-...
model    = gpt-4o
api_base = https://api.openai.com/v1

# Local model (Ollama, llama.cpp's llama-server, LM Studio, vLLM, ...). A machine
# with the GPU to run whisper for dictation can usually run a small model for the
# style pass too: no API key, no per-request cost, nothing leaves the machine.
#
# api_base is everything before /chat/completions, so it must include the path
# prefix the local server mounts its OpenAI API under (Ollama and llama.cpp use
# /v1). api_key is ignored by the server but must be present and non-empty, since
# a section with no api_key counts as unconfigured. Pull the model first
# (ollama pull qwen3:8b).
#
# qwen3:8b fits an 8 GB card and returns a clean rewrite through Ollama's
# OpenAI-compatible endpoint: its reasoning goes to a separate field scribe does
# not read, so the styled text carries no <think> content. Pair a local provider
# with --auto-style-delay 1 for immediate styling (there is no per-request cost
# to pause for).
[provider.ollama]
api_key  = ollama
model    = qwen3:8b
api_base = http://localhost:11434/v1
# Drop the model from VRAM after each style pass (Ollama native /api/generate,
# keep_alive 0) so whisper has the GPU on the next recording. On here because on
# an 8 GB card the model and whisper-medium do not both fit; without it, a style
# pass leaves the model resident and the next dictation can fail to transcribe.
# Costs a cold model reload (a few seconds) on the next style pass. Ollama-only;
# cloud providers have no such endpoint, so leave it off for them.
unload_after_style = true

# --- Transcription backend ---------------------------------------------------
# scribe transcribes with whisper-cli locally, or on a whisper.cpp server.
# Independent of [provider.*] above: transcription, not styling.
#
# For local transcription, name the whisper model here; --model overrides it on
# the command line. There is no built-in default path, so one of the two must
# be given for --input voice.
[whisper]
model = /path/to/whisper-models/ggml-medium.en.bin

# To transcribe on a whisper.cpp server instead, set server_url. You run the
# server yourself (scribe only reaches the URL); server mode needs curl.
#   server_url present        -> use the server (error if it is down)
#   + fallback_local = true   -> use the server, or whisper-cli if the server fails
# With fallback_local, keep `model` set so the local path can take over.
# server_url = http://localhost:8080
# fallback_local = true
